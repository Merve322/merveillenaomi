    content: `
      <h2>Overview</h2>
      <p>The Initialise section of the Paystack API documentation has several issues that make it harder for developers to understand and implement correctly. These problems are identified here, with a clearer fix rewritten, and an explanation for why the improved version is better.</p>

      <h2>The problem</h2>
      <h3>1. Weak mental model</h3>
      <p>The documentation says:</p>
      <blockquote><p>"Initialise the transaction from your backend"</p></blockquote>
      <p>It doesn't clearly answer: what is initialising? What does it actually do in the payment flow? This leaves beginners without a clear understanding of the step.</p>

      <h3>2. Code appears too fast</h3>
      <p>The code is introduced without explaining what the request represents or what the developer is trying to achieve. This quickly increases cognitive load.</p>

      <h3>3. Incomplete response explanation</h3>
      <p>The documentation mentions the <code>access_code</code> parameter but doesn't explain how it's used, and doesn't mention the <code>authorization_url</code> — which is critical for completing the payment.</p>

      <h3>4. Incomplete flow</h3>
      <p>The developer doesn't see the full picture. What should have been said: "After this → redirect user → payment happens."</p>

      <h3>5. Disconnected security warning</h3>
      <p>The "Don't use your secret key…" section feels abrupt and is not integrated into the flow.</p>

      <div class="compare-grid">
        <div class="compare-col">
          <div class="compare-label before">Before</div>
          <ul>
            <li>No mental model</li>
            <li>Code appears immediately</li>
            <li>Response fields unexplained</li>
            <li>Flow ends abruptly</li>
            <li>Security warning disconnected</li>
          </ul>
        </div>
        <div class="compare-col">
          <div class="compare-label after">After</div>
          <ul>
            <li>Clear context-setting intro</li>
            <li>Explanation before code</li>
            <li>All response fields defined</li>
            <li>Full redirect flow shown</li>
            <li>Security note woven in naturally</li>
          </ul>
        </div>
      </div>

      <h2>The rewrite</h2>
      <p>Before a customer can make a payment, you need to create a transaction. When you are initialising a transaction, you are telling Paystack: who is making the payment, how much they should be charged, and to prepare a payment session for them.</p>
      <p>Follow these steps from your backend to keep your secret key secure.</p>

      <h3>Step 1: Send a request to Paystack</h3>
      <pre><code>curl -X POST https://api.paystack.co/transaction/initialize \\
  -H "Authorization: Bearer YOUR_SECRET_KEY" \\
  -H "Content-Type: application/json" \\
  -d '{
        "email": "customer@email.com",
        "amount": 500000
      }'</code></pre>
      <p>This request creates a new transaction for the specified customer and amount.</p>

      <p>Paystack returns a response containing important details. Inside the <code>data</code> object:</p>
      <ul>
        <li><code>authorization_url</code> — the link where the customer completes payment.</li>
        <li><code>reference</code> — a unique ID for tracking the transaction.</li>
        <li><code>access_code</code> — used internally to verify and manage the transaction.</li>
      </ul>

        <p>Always initialise transactions from your backend. Never call Paystack's API directly from your frontend — this exposes your secret key. Your frontend should communicate with your server, which then makes the request to Paystack.</p>

    content: `
      <h2>Overview</h2>
      <p>This guide walks through the complete Paystack payment flow in sequence — from initialising a transaction to verifying payment — so developers understand how each step connects.</p>

      <h2>Step 1: Initialise transaction</h2>
      <p>The payment flow begins when your server creates a transaction. This step tells Paystack: who is making the payment, how much they are to be charged, and that a payment session should be prepared.</p>
      <pre><code>curl -X POST https://api.paystack.co/transaction/initialize \\
  -H "Authorization: Bearer YOUR_SECRET_KEY" \\
  -H "Content-Type: application/json" \\
  -d '{
        "email": "testuser@email.com",
        "amount": 500000
      }'</code></pre>
      <p>Paystack responds with:</p>
      <pre><code>{
  "status": true,
  "message": "Authorization URL created",
  "data": {
    "authorization_url": "https://checkout.paystack.com/...",
    "access_code": "...",
    "reference": "..."
  }
}</code></pre>
      <ul>
        <li><code>authorization_url</code> — where the customer completes payment.</li>
        <li><code>reference</code> — used to verify the transaction later.</li>
        <li><code>access_code</code> — used internally by Paystack to manage the checkout flow.</li>
      </ul>
      <p>The <code>authorization_url</code> is the most important part of this response.</p>

      <h2>Step 2: Redirect the customer</h2>
      <p>The customer is redirected to the <code>authorization_url</code>. Paystack handles the payment interface and security — you don't need to build this yourself.</p>

      <h2>Step 3: Customer completes transaction</h2>
      <p>The customer enters their card details on Paystack's secure page. Paystack processes the payment and may redirect the customer back to your frontend, depending on your integration configuration.</p>

      <h2>Step 4: Verify transaction</h2>
      <p>After payment, your server must verify the transaction. Never rely on the frontend for confirmation — it can be manipulated.</p>
      <pre><code>curl https://api.paystack.co/transaction/verify/:reference</code></pre>
      <p>Use the <code>reference</code> from step 1 to confirm the payment was successful before granting access or delivering value.</p>

      <div class="callout-box">
        <div class="callout-label">Common mistakes</div>
        <p>Verifying payment on the frontend · Not storing the transaction reference · Skipping the verification step · Exposing your secret key in frontend code</p>
      </div>
    `

      <h2>Overview</h2>
      <p>The goal of good documentation is to make integration clear and predictable. However, on Paystack's "Accept Payments" page, multiple payment flows are presented together without clear separation — making it difficult for developers to know what steps apply to their use case.</p>
      <p>One critical point of confusion occurs after the payment step. This guide focuses on that confusion, explains why it happens, and proposes how it can be fixed.</p>

      <h2>Where developers get stuck</h2>
      <p>The documentation presents a high-level flow: initialise, complete, verify. But as the page progresses, redirects, callback URLs, and webhooks are introduced without being tied back to the main flow.</p>
      <p>After a customer completes payment and is redirected, the flow appears finished. A developer may reasonably assume: <em>"The user has paid, so the transaction is complete."</em> This is where the confusion occurs.</p>

      <h2>Why this happens</h2>
      <ul>
        <li>Verification is introduced but not strongly emphasised as mandatory.</li>
        <li>The redirect step gives a false sense of completion.</li>
        <li>The documentation does not clearly define backend responsibility.</li>
      </ul>
      <p>This leads to a dangerous assumption: that the frontend confirms success, or that the redirect confirms payment — when neither guarantees a transaction was successful.</p>

      <h2>The correct mental model</h2>
      <div class="callout-box">
        <div class="callout-label">Key principle</div>
        <p>A payment is not complete when the user finishes with the payment page. It is only complete when your backend verifies the transaction. The frontend can be manipulated. A redirect indicates a flow has ended — not that payment was successful. Your backend must be the source of truth.</p>
      </div>

      <h2>The correct way to handle it</h2>
      <ol>
        <li>Retrieve the reference from the callback URL</li>
        <li>Send a verification request from your backend:</li>
      </ol>
      <pre><code>curl https://api.paystack.co/transaction/verify/:reference</code></pre>
      <ol start="3">
        <li>Confirm the transaction status is successful and the amount matches what was expected.</li>
      </ol>
      <p>Only after this verification should you grant access or deliver value.</p>

      <h2>How the documentation could be improved</h2>
      <ul>
        <li>Add an explicit warning: "Payment is not complete until verified."</li>
        <li>Place the verification step immediately after the redirect step.</li>
        <li>Define backend verification as required — not optional.</li>
        <li>Separate different payment flows (Popup, Redirect, SDKs) for clarity.</li>
      </ul>

      <h2>Key takeaway</h2>
      <p>A successful payment flow is not complete after the user pays. It is complete only after your backend verifies the transaction. With clearer flow separation and an unambiguous verification requirement, the Paystack documentation could prevent this mistake entirely.</p>
    `
  }

.compare-col ul{margin-left:1rem;font-size:13px;color:var(--ink2);font-weight:300;line-height:1.75;}

.about-section{background:var(--ink);padding:6rem 3rem;position:relative;overflow:hidden;}
.about-section::before{content:'';position:absolute;top:-50%;right:-10%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle, rgba(184,147,90,0.08) 0%, transparent 70%);pointer-events:none;}
.about-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:6rem;align-items:center;}
.about-eyebrow{font-size:10px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:var(--gold);margin-bottom:1.2rem;display:flex;align-items:center;gap:10px;}
.about-eyebrow::before{content:'';display:block;width:24px;height:1px;background:var(--gold);}
.about-name{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:300;color:#fff;letter-spacing:-0.02em;line-height:1.1;margin-bottom:1.5rem;}
.about-bio{font-size:14.5px;font-weight:300;color:rgba(255,255,255,0.55);line-height:1.85;margin-bottom:2rem;}
.about-right{display:flex;flex-direction:column;gap:2rem;}
.about-stat{border-top:1px solid rgba(255,255,255,0.08);padding-top:1.5rem;}
.stat-label{font-size:9px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-bottom:0.4rem;}
.stat-value{font-size:14px;color:rgba(255,255,255,0.7);font-weight:300;}

footer{background:var(--dark);padding:2rem 3rem;display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(255,255,255,0.05);}
footer p{font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:0.04em;}
.footer-logo{font-family:'Cormorant Garamond',serif;font-size:16px;color:rgba(255,255,255,0.4);display:flex;align-items:center;gap:6px;}

.home-view.hidden{display:none;}
</style>
</head>
<body>

<nav>
  <div class="logo"><div class="logo-dot"></div><span id="nav-name"></span></div>
  <div class="nav-right">
    <ul class="nav-links">
      <li><a href="#" onclick="showHome();return false">Work</a></li>
      <li><a href="#about-anchor">About</a></li>
    </ul>
    <a id="nav-hire" class="nav-cta">Hire me</a>
  </div>
</nav>

<div class="home-view" id="home-view">
  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-lines"></div>
    <div class="hero-tag-row">
      <div class="hero-tag">API Documentation</div>
      <div class="hero-tag">SDK Guides</div>
      <div class="hero-tag">Developer Experience</div>
    </div>
    <div class="hero-number" id="hero-count"></div>
    <div class="hero-label">Technical Writing Portfolio</div>
    <h1 id="hero-tagline"></h1>
    <p class="hero-sub" id="hero-sub"></p>
    <div class="hero-actions">
      <button class="btn-dark" onclick="document.getElementById('work-anchor').scrollIntoView({behavior:'smooth'})">View selected work</button>
      <button class="btn-outline" onclick="document.getElementById('about-anchor').scrollIntoView({behavior:'smooth'})">About me</button>
    </div>
    <div class="hero-scroll"><span>Scroll</span><div class="scroll-line"></div></div>
  </section>

  <div class="marquee-bar"><div class="marquee-inner" id="marquee"></div></div>

  <div class="work-section" id="work-anchor">
    <div class="section-intro">
      <div>
        <div class="section-eyebrow">Selected work</div>
        <div class="section-heading" id="work-heading"></div>
      </div>
      <div class="section-desc" id="section-desc"></div>
    </div>
    <div class="pieces-list" id="pieces-list"></div>
  </div>

  <div class="about-section" id="about-anchor">
    <div class="about-inner">
      <div>
        <div class="about-eyebrow">About</div>
        <div class="about-name" id="about-name"></div>
        <div class="about-bio" id="about-bio"></div>
        <a id="about-cta" class="btn-dark" style="display:inline-block;text-decoration:none;">Get in touch →</a>
      </div>
      <div class="about-right">
        <div class="about-stat"><div class="stat-label">Speciality</div><div class="stat-value" id="stat-spec"></div></div>
        <div class="about-stat"><div class="stat-label">Availability</div><div class="stat-value" id="stat-avail"></div></div>
        <div class="about-stat"><div class="stat-label">Based in</div><div class="stat-value" id="stat-loc"></div></div>
        <div class="about-stat"><div class="stat-label">Focus markets</div><div class="stat-value" id="stat-mkt"></div></div>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-logo"><div class="logo-dot"></div><span id="footer-name"></span></div>
    <p>Technical Writer · API & SDK Documentation</p>
    <p id="footer-loc"></p>
  </footer>
</div>

<div id="detail-container"></div>

<script>
// ── Populate personal details ──────────────────────────────
document.getElementById('nav-name').textContent = ME.name;
document.getElementById('nav-hire').href = 'mailto:' + ME.email;
document.getElementById('hero-count').textContent = PORTFOLIO.length;
document.getElementById('hero-tagline').innerHTML = 'Docs that make<br>developers feel<br><em>understood.</em>';
document.getElementById('hero-sub').textContent = 'I write API and SDK documentation that reduces integration time, lowers support burden, and earns developer trust — for African and global tech companies.';
document.getElementById('about-name').innerHTML = ME.name.replace(' ', '<br>');
document.getElementById('about-bio').textContent = ME.bio;
document.getElementById('about-cta').href = 'mailto:' + ME.email;
document.getElementById('stat-spec').textContent = ME.speciality;
document.getElementById('stat-avail').textContent = ME.availability;
document.getElementById('stat-loc').textContent = ME.location;
document.getElementById('stat-mkt').textContent = ME.markets;
document.getElementById('footer-name').textContent = ME.name;
document.getElementById('footer-loc').textContent = ME.location;

// Work section heading adapts to piece count
const count = PORTFOLIO.length;
const headings = {
  1: 'One piece.<br>One standard.',
  2: 'Two pieces.<br>Two angles.',
  3: 'Three pieces.<br>One API.<br>Every angle.',
  4: 'Four pieces.<br>Multiple APIs.<br>Every angle.',
  5: 'Five pieces.<br>Range and depth.',
};
document.getElementById('work-heading').innerHTML = headings[count] || count + ' pieces.<br>Range and depth.';

// Work section description adapts dynamically from portfolio data
const apis = [...new Set(PORTFOLIO.flatMap(p => p.tags))].filter(t =>
  ['Paystack','Flutterwave','Mono','Kuda','Termii','Stripe','Twilio','OpenWeatherMap'].includes(t)
);
const types = [...new Set(PORTFOLIO.map(p => p.type))];
const apiText = apis.length > 1
  ? apis.slice(0,-1).join(', ') + ' and ' + apis[apis.length-1]
  : apis[0] || 'multiple APIs';
const typeText = types.length > 2
  ? types.slice(0,-1).join(', ').toLowerCase() + ', and ' + types[types.length-1].toLowerCase()
  : types.map(t => t.toLowerCase()).join(' and ');
document.getElementById('section-desc').textContent =
  `${count} piece${count > 1 ? 's' : ''} covering ${apiText} — including ${typeText}. Each demonstrates a different skill: how I audit existing docs, guide developers end to end, and analyse where integrations break down.`;

// ── Marquee ────────────────────────────────────────────────
const marqueeItems = ['API Documentation','SDK Guides','Developer Experience','Technical Writing','Paystack · Flutterwave · Mono','Documentation Audits','Integration Guides','African Fintech'];
const m = document.getElementById('marquee');
[...marqueeItems,...marqueeItems].forEach((t,i)=>{
  const s = document.createElement('span');
  s.className = 'marquee-item' + (i%2===0?' gold':'');
  s.textContent = t;
  m.appendChild(s);
});

// ── Build work list ────────────────────────────────────────
const list = document.getElementById('pieces-list');
PORTFOLIO.forEach((piece, i) => {
  const row = document.createElement('div');
  row.className = 'piece-row';
  row.onclick = () => showDetail(i);
  row.innerHTML = `
    <div class="piece-num">${String(i+1).padStart(2,'0')}</div>
    <div class="piece-info">
      <div class="piece-badge">${piece.type}</div>
      <div class="piece-title-main">${piece.title}</div>
      <div class="piece-desc-main">${piece.summary}</div>
      <div class="piece-tags-row">${piece.tags.map(t=>`<span class="ptag">${t}</span>`).join('')}</div>
    </div>
    <div class="piece-cta">Read <div class="cta-arrow">→</div></div>
  `;
  list.appendChild(row);
});

// ── Build detail pages ─────────────────────────────────────
const container = document.getElementById('detail-container');
PORTFOLIO.forEach((piece, i) => {
  const page = document.createElement('div');
  page.className = 'detail-page';
  page.id = 'detail-' + i;
  page.innerHTML = `
    <div class="detail-top">
      <button class="back-btn" onclick="showHome()">← Back to work</button>
      <div class="detail-badge">${piece.type}</div>
      <div class="detail-title">${piece.title}</div>
      <div class="detail-intro">${piece.intro}</div>
      <div class="detail-meta-row">
        ${piece.tags.map(t=>`<div class="meta-chip"><div class="meta-chip-dot"></div>${t}</div>`).join('')}
      </div>
    </div>
    <div class="doc-body">${piece.content}</div>
  `;
  container.appendChild(page);
});

// ── Navigation ─────────────────────────────────────────────
function showDetail(i) {
  document.getElementById('home-view').classList.add('hidden');
  document.querySelectorAll('.detail-page').forEach(d => d.classList.remove('active'));
  document.getElementById('detail-' + i).classList.add('active');
  window.scrollTo({top:0,behavior:'instant'});
}
function showHome() {
  document.getElementById('home-view').classList.remove('hidden');
  document.querySelectorAll('.detail-page').forEach(d => d.classList.remove('active'));
  window.scrollTo({top:0,behavior:'instant'});
}
</script>
</body>
</html>
