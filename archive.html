<script>
document.addEventListener('DOMContentLoaded', () => {
  
  // Set dynamic content
  document.getElementById('nav-hire').href = 'mailto:' + ME.email;
  document.getElementById('footer-name').textContent = ME.name;
  document.getElementById('archive-count').textContent = PORTFOLIO.length + ' piece' + (PORTFOLIO.length > 1 ? 's' : '');

  // Build archive grid
  const grid = document.getElementById('archive-grid');
  PORTFOLIO.forEach((piece, i) => {
    const card = document.createElement('a');
    card.className = 'archive-card';
    card.href = piece.filename;
    card.innerHTML = `
      <div class="archive-card-num">${String(i+1).padStart(2,'0')}</div>
      <div class="archive-card-badge">${piece.type}</div>
      <div class="archive-card-title">${piece.title}</div>
      <div class="archive-card-summary">${piece.summary}</div>
      <div class="archive-card-tags">${piece.tags.map(t => `<span class="ptag">${t}</span>`).join('')}</div>
      <div class="archive-card-arrow">→</div>
    `;
    grid.appendChild(card);
  });

});
</script>
